<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker V3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}
input, select, button {
  margin: 5px 0;
  padding: 10px;
  width: 100%;
  border-radius: 5px;
  border: none;
}
button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}
h2,h3 { margin: 5px 0 10px }
</style>
</head>

<body>

<h2>💰 Finance Tracker</h2>

<div class="card">
  <h3>Saldo: Rp <span id="balance">0</span></h3>
</div>

<div class="card">
  <h3>Input Data</h3>
  <input type="number" id="income" placeholder="Pemasukan">
  <input type="number" id="saving" placeholder="Tabungan">
  <input type="number" id="expense" placeholder="Pengeluaran">

  <select id="category">
    <option value="Makan">Makan</option>
    <option value="Bensin">Bensin</option>
    <option value="Belanja">Belanja</option>
    <option value="Hiburan">Hiburan</option>
    <option value="Lainnya">Lainnya</option>
  </select>

  <button onclick="addData()">Tambah</button>
</div>

<div class="card">
  <h3>📅 Filter</h3>
  <input type="date" id="startDate">
  <input type="date" id="endDate">
  <button onclick="applyFilter()">Filter</button>
</div>

<div class="card">
  <h3>📊 Grafik Utama</h3>
  <canvas id="mainChart"></canvas>
</div>

<div class="card">
  <h3>📊 Grafik Kategori</h3>
  <canvas id="categoryChart"></canvas>
</div>

<div class="card">
  <h3>📜 Riwayat</h3>
  <ul id="history"></ul>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];
let mainChart, categoryChart;

function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

function getFilteredData() {
  let start = document.getElementById("startDate").value;
  let end = document.getElementById("endDate").value;

  return data.filter(item => {
    if (start && item.date < start) return false;
    if (end && item.date > end) return false;
    return true;
  });
}

function addData() {
  let income = Number(document.getElementById('income').value) || 0;
  let saving = Number(document.getElementById('saving').value) || 0;
  let expense = Number(document.getElementById('expense').value) || 0;
  let category = document.getElementById('category').value;

  let today = new Date().toISOString().split("T")[0];

  data.push({ income, saving, expense, category, date: today });

  save();
  renderAll();
}

function updateBalance() {
  let filtered = getFilteredData();

  let totalIncome = filtered.reduce((a,b)=>a+b.income,0);
  let totalSaving = filtered.reduce((a,b)=>a+b.saving,0);
  let totalExpense = filtered.reduce((a,b)=>a+b.expense,0);

  let balance = totalIncome - totalSaving - totalExpense;

  document.getElementById("balance").innerText =
    balance.toLocaleString("id-ID");
}

function updateMainChart() {
  let filtered = getFilteredData();

  let totalIncome = filtered.reduce((a,b)=>a+b.income,0);
  let totalSaving = filtered.reduce((a,b)=>a+b.saving,0);
  let totalExpense = filtered.reduce((a,b)=>a+b.expense,0);

  if (mainChart) mainChart.destroy();

  mainChart = new Chart(document.getElementById("mainChart"), {
    type: "doughnut",
    data: {
      labels: ["Pemasukan","Tabungan","Pengeluaran"],
      datasets: [{
        data: [totalIncome, totalSaving, totalExpense]
      }]
    },
    options: {
      plugins: {
        datalabels: {
          formatter: (value, ctx) => {
            let total = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
            let percent = total ? (value/total*100).toFixed(1) : 0;
            return percent + "%";
          },
          color: "#fff"
        }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function updateCategoryChart() {
  let filtered = getFilteredData();

  let categories = {};

  filtered.forEach(item => {
    if (!categories[item.category]) categories[item.category] = 0;
    categories[item.category] += item.expense;
  });

  if (categoryChart) categoryChart.destroy();

  categoryChart = new Chart(document.getElementById("categoryChart"), {
    type: "bar",
    data: {
      labels: Object.keys(categories),
      datasets: [{
        data: Object.values(categories)
      }]
    },
    options: {
      plugins: {
        legend: { display:false },
        datalabels: {
          color:"#fff",
          formatter: v => "Rp " + v.toLocaleString("id-ID")
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

function renderHistory() {
  let filtered = getFilteredData();
  let list = document.getElementById("history");
  list.innerHTML = "";

  filtered.reverse().forEach(item => {
    let li = document.createElement("li");
    li.innerText =
      `${item.date} | +${item.income} | -${item.expense} (${item.category})`;
    list.appendChild(li);
  });
}

function applyFilter() {
  renderAll();
}

function renderAll() {
  updateBalance();
  updateMainChart();
  updateCategoryChart();
  renderHistory();
}

renderAll();
</script>

</body>
</html>
