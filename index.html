<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Manager PRO V3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin: 10px 0;
}

button {
  background: #22c55e;
  border: none;
  padding: 10px;
  color: white;
  border-radius: 8px;
  width: 100%;
  margin-top: 10px;
}

.reset {
  background: #ef4444;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
  border: none;
}

.history {
  text-align: left;
  font-size: 14px;
  max-height: 150px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 Finance Manager PRO V3</h2>

<div class="card">
  <p>Pemasukan (Saldo Pribadi)</p>
  <input type="number" id="income">
</div>

<div class="card">
  <p>Tabungan</p>
  <input type="number" id="saving">
</div>

<div class="card">
  <p>Pengeluaran</p>
  <input type="number" id="expense">
</div>

<button onclick="addData()">Tambah Data</button>
<button class="reset" onclick="resetData()">Reset</button>

<canvas id="chart"></canvas>

<div class="card">
  <h3>📊 Riwayat</h3>
  <div id="history" class="history"></div>
</div>

</div>

<script>
let chart;
let data = JSON.parse(localStorage.getItem("financeV3")) || [];

function formatRupiah(num) {
  return "Rp " + num.toLocaleString("id-ID");
}

function save() {
  localStorage.setItem("financeV3", JSON.stringify(data));
}

function renderHistory() {
  let el = document.getElementById("history");
  el.innerHTML = "";
  data.slice().reverse().forEach(item => {
    el.innerHTML += `
      <div>
        💰 ${formatRupiah(item.income)} |
        🏦 ${formatRupiah(item.saving)} |
        💸 ${formatRupiah(item.expense)}
      </div>`;
  });
}

function updateChart() {
  let totalIncome = data.reduce((a,b)=>a+b.income,0);
  let totalSaving = data.reduce((a,b)=>a+b.saving,0);
  let totalExpense = data.reduce((a,b)=>a+b.expense,0);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
      labels: ['Saldo','Tabungan','Pengeluaran'],
      datasets: [{
        data: [totalIncome, totalSaving, totalExpense]
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: "#fff" }
        },
        datalabels: {
          color: "#fff",
          font: { weight: "bold", size: 14 },
          formatter: (value, context) => {
            let total = context.chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
            let percent = total ? (value / total * 100).toFixed(1) : 0;
            return percent + "%";
          }
        }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function addData() {
  let income = Number(document.getElementById('income').value) || 0;
  let saving = Number(document.getElementById('saving').value) || 0;
  let expense = Number(document.getElementById('expense').value) || 0;

  data.push({ income, saving, expense });

  save();
  renderHistory();
  updateChart();

  document.getElementById('income').value = "";
  document.getElementById('saving').value = "";
  document.getElementById('expense').value = "";
}

function resetData() {
  localStorage.removeItem("financeV3");
  data = [];
  renderHistory();
  updateChart();
}

renderHistory();
updateChart();
</script>

</body>
</html>
